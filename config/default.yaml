phase_detection:
  label_ids:
    aorta: 8
    ivc: 9
    portal_vein: 10
    liver_vein: 15
    celiac_artery: 25
  score_percentile: 50
  min_roi_voxels: 64

series_selection:
  min_slices: 100
  max_slice_thickness_mm: 1.5
  soft_kernel_keywords:
    - SOFT
    - STANDARD
    - MED
  excluded_protocol_keywords:
    - Scout
    - Dose
    - MIP
    - lung

vessel_extraction:
  hu_candidate_low: 80
  hu_candidate_high: 350
  hu_window_min_voxels: 512
  anchor_hu_window_min_voxels: 64
  image_hu_window_without_anchor: false
  hu_hard_high: 700
  organ_soft_penalty: 0.35
  min_component_volume_mm3: 8
  bbox_padding_mm: 8
  final_anchor_distance_mm: 6
  auto_anchor_confidence_min: 0.35
  auto_anchor_min_component_volume_mm3: 8
  body_min_hu: -600
  body_closing_mm: 5
  body_dilation_mm: 2
  reject_table_like_components: true
  no_label_requires_vessel_anchor: true
  include_totalseg_vessel_anchors_in_output: true
  totalseg_vessel_anchors_include_liver: false
  final_liver_surface_cleanup:
    enabled: false
    surface_depth_mm: 8
    confidence_min: 0.78
  portal_from_venous_relabel:
    enabled: false
    min_portal_minus_venous_hu: 30
  intrahepatic_recovery:
    enabled: true
    phases:
      - portal
      - venous
    hu_low_margin: 20
    hu_high_cap: 350
    local_background_sigma_mm: 6
    local_contrast_min_hu: 8
    phase_local_contrast_min_hu:
      portal: 40
      venous: 25
    relaxed_vesselness_min: 0.005
    closing_mm: 1.5
    min_component_volume_mm3: 4
    anchor_dilation_mm: 10
    component_min_elongation: 2.0
    max_component_liver_fraction: 0.10
    surface_prune_enabled: true
    surface_prune_depth_mm: 5
    surface_prune_confidence_min: 0.75
  frangi_sigmas_mm:
    - 0.6
    - 1.4
    - 3.0

